name: CI

on:
  push:
    branches: [main]
    paths: ['Fil_Rouge/**']
  pull_request:
    paths: ['Fil_Rouge/**']

defaults:
  run:
    working-directory: Fil_Rouge

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Fil_Rouge/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
